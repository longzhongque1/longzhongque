spring:
  application:
    name: ai-code-product-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_product?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username:
    password:
  session:
    store-type: redis
    # redis:30天过期
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
      password:
      database: 0

server:
  port: 8123
  servlet:
    context-path: /api
    #cookie:30天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.example.aicodeproductbackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
logging:
  level:
    com.example.aicodeproductbackend: debug
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key:
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
      #strict-json-schema: true
      #response-format: json_object
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key:
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
      # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key:
      model-name: deepseek-reasoner
      max-tokens: 32768
      temperature: 0.1
      log-requests: true
      log-responses: true
      # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key:
      model-name: qwen-flash
      max-tokens: 100
      log-requests: true
      log-responses: true

cos:
  client:
    host: 'https://ikun-picture-1383167210.cos.ap-chengdu.myqcloud.com'
    secretId:
    secretKey:
    region:
    bucket:

# Pexels 图片搜索配置
pexels:
  api-key:
# 阿里云 DashScope 配置
dashscope:
  api-key:
  image-model: wan2.2-t2i-flash
